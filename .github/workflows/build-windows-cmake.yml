---
name: Build - Windows - CMake

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'source/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
  push:
    paths:
      - 'src/**'
      - 'source/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
    branches:
      - main

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  MAKEFLAGS: '-j 2'
  VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-windows-static

jobs:
  job:
    if: ${{ github.event_name == 'push' || !github.event.pull_request.draft }}
    permissions:
      contents: read
    name: ${{ matrix.os }}-${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022]
        buildtype: [ windows-release ]
        include:
          - os: windows-2022
            triplet: x64-windows-static
    steps:
      - name: Cancel Previous Runs
        if: github.ref != 'refs/heads/main'
        uses: fkirc/skip-duplicate-actions@master
        with:
          concurrent_skipping: 'same_content'
          cancel_others: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve vcpkg baseline
        id: vcpkg-baseline
        run: |
          $json=Get-Content vcpkg.json -Raw | ConvertFrom-Json
          $vcpkgCommitId=$json.'builtin-baseline'
          Write-Host "vcpkg commit ID: $vcpkgCommitId"
          echo "commit=$vcpkgCommitId" >> $env:GITHUB_OUTPUT

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-installed-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}-${{ steps.vcpkg-baseline.outputs.commit }}
          restore-keys: |
            vcpkg-installed-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}-
            vcpkg-installed-${{ matrix.triplet }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ steps.vcpkg-baseline.outputs.commit }}
          vcpkgJsonGlob: vcpkg.json
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          doNotCache: true
          runVcpkgInstall: false

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg/downloads
          key: vcpkg-downloads-${{ steps.vcpkg-baseline.outputs.commit }}
          restore-keys: vcpkg-downloads-

      - name: Install vcpkg dependencies
        shell: bash
        run: "${VCPKG_ROOT}/vcpkg.exe" install --triplet=${VCPKG_DEFAULT_TRIPLET}

      - name: Get latest CMake and ninja
        uses: lukka/get-cmake@main

      - name: Run CMake
        uses: lukka/run-cmake@main
        env:
          SCCACHE_DISABLE: 1
        with:
          configurePreset: ${{ matrix.buildtype }}
          buildPreset: ${{ matrix.buildtype }}
          configureArguments: '-DOPTIONS_ENABLE_SCCACHE=OFF'

      - name: Create and Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: rme-${{ matrix.buildtype }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/*.exe
