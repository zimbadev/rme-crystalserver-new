---
name: Build - Windows - Solution

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "source/**"
      - "vcproj/**"
      - "vcpkg.json"
  merge_group:
  push:
    paths:
      - "source/**"
      - "vcproj/**"
      - "vcpkg.json"
    branches:
      - main

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  MAKEFLAGS: "-j 2"
  GITHUB_WORKSPACE: ${{ github.workspace }}
  VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-windows
  VCPKG_TRIPLET: x64-windows

jobs:
  cancel-runs:
    if: github.event_name == 'pull_request' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.9.1
        with:
          access_token: ${{ github.token }}

  job:
    if: ${{ github.event_name == 'push' || !github.event.pull_request.draft }}
    permissions:
      contents: read
    name: ${{ matrix.os }}-${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022]
        buildtype: [Release, Debug]
        include:
          - os: windows-2022
            triplet: x64-windows
    steps:
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v1.1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve vcpkg baseline
        id: vcpkg-baseline
        run: |
          $json = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          $vcpkgCommitId = $json.'builtin-baseline'
          Write-Host "vcpkg commit ID: $vcpkgCommitId"
          echo "commit=$vcpkgCommitId" >> $env:GITHUB_OUTPUT

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-installed-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}-${{ steps.vcpkg-baseline.outputs.commit }}
          restore-keys: |
            vcpkg-installed-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}-
            vcpkg-installed-${{ matrix.triplet }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ steps.vcpkg-baseline.outputs.commit }}
          vcpkgJsonGlob: vcpkg.json
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          doNotCache: true
          runVcpkgInstall: false

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg/downloads
          key: vcpkg-downloads-${{ steps.vcpkg-baseline.outputs.commit }}
          restore-keys: vcpkg-downloads-

      - name: Install vcpkg dependencies
        shell: bash
        run: "${VCPKG_ROOT}/vcpkg.exe" install --triplet=${VCPKG_DEFAULT_TRIPLET}

      - name: Print useful paths
        run: |
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"
          Write-Host "Vcpkg Path: $env:VCPKG_ROOT"
          Write-Host "Installed Path: $env:VCPKG_INSTALLED_DIR"
          Write-Host "Triplet: ${{ matrix.triplet }}"

      - name: Build project
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: msbuild.exe /p:VcpkgEnableManifest=true /p:VCPKG_ROOT="$env:VCPKG_ROOT" /p:VcpkgInstalledDir="$env:VCPKG_INSTALLED_DIR" /p:Configuration=${{ matrix.buildtype }} /p:Platform=x64 /p:GITHUB_WORKSPACE="$env:GITHUB_WORKSPACE" vcproj/RME.sln

      - name: Upload artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.os }}-${{ matrix.buildtype }}
          path: |
            ${{ github.workspace }}/vcproj/Project/x64/${{ matrix.buildtype }}/
