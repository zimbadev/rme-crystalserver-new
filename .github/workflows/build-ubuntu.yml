---
name: Build - Ubuntu

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'source/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - '.github/workflows/build-ubuntu.yml'
  merge_group:
  push:
    paths:
      - 'src/**'
      - 'source/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - '.github/workflows/build-ubuntu.yml'
    branches:
      - main

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  MAKEFLAGS: '-j 2'
  VCPKG_BINARY_SOURCES: clear
  VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DEFAULT_TRIPLET: x64-linux

jobs:
  job:
    if: ${{ github.event_name == 'push' || !github.event.pull_request.draft }}
    permissions:
      actions: write
      contents: read
    name: ${{ matrix.os }}-${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04 ]
        buildtype: [ linux-release ]
        include:
          - os: ubuntu-22.04
            triplet: x64-linux

    steps:
      - name: Cancel Previous Runs
        if: github.ref != 'refs/heads/main'
        uses: fkirc/skip-duplicate-actions@master
        with:
          concurrent_skipping: 'same_content'
          cancel_others: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          ccache
          linux-headers-$(uname -r)
          libasio-dev
          nlohmann-json3-dev
          libfmt-dev
          bison
          libxi-dev
          libxext-dev
          libx11-dev
          libgl1-mesa-dev
          libglu1-mesa-dev
          libegl1-mesa-dev
          mesa-common-dev
          libxrandr-dev
          libxxf86vm-dev
          libxinerama-dev
          libxcursor-dev
          libxpm-dev
          libglvnd-dev
          libglvnd0
          libxft-dev
          libwayland-dev
          libxkbcommon-dev
          libibus-1.0-dev
          libasound2-dev
          libxmu-dev
          libdbus-1-dev
          libxtst-dev
          linux-libc-dev
          libarchive-dev
          libwxgtk3.0-gtk3-dev
          python3-distutils
          libxrender-dev

      - name: CCache
        uses: hendrikmuhs/ccache-action@main
        with:
          max-size: "1G"
          key: ccache-${{ matrix.os }}-${{ matrix.buildtype }}
          restore-keys: |
            ccache-${{ matrix.os }}

      - name: Resolve vcpkg baseline
        id: vcpkg-baseline
        run: |
          vcpkgCommitId=$(grep '.builtin-baseline' vcpkg.json | awk -F: '{print $2}' | tr -d '," ')
          echo "vcpkg commit ID: $vcpkgCommitId"
          echo "commit=$vcpkgCommitId" >> "$GITHUB_OUTPUT"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitURL: "https://github.com/microsoft/vcpkg.git"
          vcpkgGitCommitId: ${{ steps.vcpkg-baseline.outputs.commit }}
          vcpkgJsonGlob: vcpkg.json
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          doNotCache: true
          runVcpkgInstall: false

      - name: Disable vcpkg GHA binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear" >> "$GITHUB_ENV"

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg_installed
            ${{ github.workspace }}/vcpkg/downloads
            ${{ github.workspace }}/vcpkg/packages
            ${{ github.workspace }}/vcpkg/buildtrees
          key: vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}-${{ steps.vcpkg-baseline.outputs.commit }}
          restore-keys: |
            vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}-
            vcpkg-${{ matrix.triplet }}-

      - name: Install vcpkg dependencies
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4; do
            echo "vcpkg install attempt ${attempt}/4"
            if "$VCPKG_ROOT/vcpkg" install --triplet "${VCPKG_DEFAULT_TRIPLET}"; then
              exit 0
            fi
            if [ "$attempt" -lt 4 ]; then
              echo "Attempt ${attempt} failed (often transient download errors). Retrying in 45s..."
              sleep 45
            fi
          done
          echo "vcpkg install failed after 4 attempts."
          exit 1

      - name: Get latest CMake and ninja
        uses: lukka/get-cmake@main

      - name: Run CMake Cache and Build
        uses: lukka/run-cmake@main
        with:
          configurePreset: ${{ matrix.buildtype }}
          buildPreset: ${{ matrix.buildtype }}

      - name: Upload artifacts
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.os }}-${{ matrix.buildtype }}
          path: |
            ${{ github.workspace }}/rme
